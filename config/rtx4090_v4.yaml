# =============================================================================
# V4: Full-data training with density augmentation
# =============================================================================
# Key: train on ALL 270 sequences (train+val) with density augmentation 
# to maximize data and bridge domain gap to test sequences.
# Backbone stays frozen to prevent overfitting.
# =============================================================================

experiment:
  name: "spark2026_v4"
  seed: 42

data:
  data_dir: "."
  batch_size: 64
  num_workers: 0
  num_bins: 5
  height: 720
  width: 1280
  target_size: [256, 256]
  augmentation: true
  normalize_translation: true
  density_augmentation: true    # Random event dropout: 20-100% kept
  train_split: "train_all"      # Use all 270 sequences (train+val)

model:
  backbone: "efficientnet"
  pretrained: true
  freeze_backbone: true         # FROZEN — prevent overfitting
  unfreeze_at_epoch: 999
  backbone_lr_scale: 0.1
  rotation_repr: "6d"
  in_channels: 10
  feature_dim: 512
  hidden_dim: 256
  base_channels: 32
  dropout: 0.2                  # Standard dropout
  with_uncertainty: false

loss:
  trans_weight: 1.0
  rot_weight: 3.0
  trans_loss_type: "smooth_l1"
  rot_loss_type: "geodesic"

training:
  epochs: 60
  learning_rate: 0.0003         # Standard LR — fresh training
  weight_decay: 0.01
  scheduler: "cosine_warm_restarts"
  T_0: 10
  T_mult: 2
  warmup_epochs: 3
  amp: true
  grad_clip: 0.5
  save_every_epoch: true

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints_v4"
  log_interval: 10
  val_interval: 1
  save_best: true
