# V13: Stealth Precision (V7 Fine-tune Specialist)
# Changes:
# 1. Resumes from V7 best checkpoint (320x320)
# 2. Specialist Orientation Focus: rot_weight = 10.0 (Conservative but firm)
# 3. Stealth Mode: Disabled V11/V12 robust augmentations to restore feature stability
# 4. Ultra-fine LR: 1e-5 (Preserving pretrained V7 features)

experiment:
  name: "spark2026_v13_stealth"
  seed: 42

data:
  data_dir: "."
  num_bins: 5
  height: 720
  width: 1280
  target_size: [320, 320]    # Back to Magic Resolution
  batch_size: 64
  num_workers: 0             # Windows stability
  augmentation: true         # V7 baseline flips enabled
  robust_augmentation: false # Gated V11 additions DISABLED 
  density_augmentation: true
  normalize_translation: true
  train_split: "train" 

model:
  backbone: "efficientnet_b3"
  in_channels: 10
  feature_dim: 1024
  hidden_dim: 512
  dropout: 0.2
  freeze_backbone: false     # Fine-tune everything
  backbone_lr_scale: 0.5     # Slower backbone than head

loss:
  trans_weight: 1.0
  rot_weight: 10.0           # Balanced Specialist Focus 
  trans_loss_type: "huber"
  rot_loss_type: "geodesic"

training:
  epochs: 60                 # ~30 epochs of fine-tuning relative to V7
  learning_rate: 0.00001     # Surgical LR
  weight_decay: 0.01
  amp: true
  scheduler: "cosine"
  warmup_epochs: 1

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints_v13"
  log_interval: 10
  val_interval: 1
  save_best: true
