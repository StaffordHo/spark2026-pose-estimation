# =============================================================================
# Generalization-First Configuration for RTX 4090
# =============================================================================
# Key insight: Frozen backbone (ImageNet features) generalizes BETTER to
# test data than fine-tuned backbone. Test data has 6x higher event density
# than training data, causing domain shift when backbone overfits.
#
# Strategy:
#   1. Keep backbone FROZEN — ImageNet features are domain-agnostic
#   2. Only train the pose head (857K params → fast convergence)
#   3. Event density augmentation for domain robustness
#   4. Save checkpoints every epoch to find best test generalization
#   5. Use TTA at inference
# =============================================================================

experiment:
  name: "spark2026_generalize"
  seed: 42

data:
  data_dir: "."
  batch_size: 64
  num_workers: 0              # Data pre-loaded in RAM
  num_bins: 5
  height: 720
  width: 1280
  target_size: [256, 256]
  augmentation: true
  normalize_translation: true
  density_augmentation: true   # Random event subsampling for density robustness

model:
  backbone: "efficientnet"
  pretrained: true
  freeze_backbone: true        # KEEP FROZEN — key for generalization
  unfreeze_at_epoch: 999       # Never unfreeze
  backbone_lr_scale: 0.1
  rotation_repr: "6d"
  in_channels: 10
  feature_dim: 512
  hidden_dim: 256
  base_channels: 32
  dropout: 0.3                 # Higher dropout for regularization
  with_uncertainty: false

loss:
  trans_weight: 1.0
  rot_weight: 3.0
  trans_loss_type: "smooth_l1"
  rot_loss_type: "geodesic"

training:
  epochs: 30
  learning_rate: 0.0003
  weight_decay: 0.01
  scheduler: "cosine_warm_restarts"
  T_0: 10
  T_mult: 2
  warmup_epochs: 3
  amp: true
  grad_clip: 0.5
  save_every_epoch: true       # Save checkpoint every epoch

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  log_interval: 10
  val_interval: 1
  save_best: true
